version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bus_reservation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db
    networks:
      - bus-net

  db:
    image: mysql:8.0
    ports:
      - "3307:3306" # Expose on 3307 to avoid conflict with local MySQL if running
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=bus_reservation
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - bus-net

networks:
  bus-net:
    driver: bridge

volumes:
  db-data:
