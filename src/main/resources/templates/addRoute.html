<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="main-content">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">Add New Route</div>
                        <div class="card-body">
                            <form th:action="@{/admin/add-route}" method="post" th:object="${route}">
                                <div class="mb-3">
                                    <label for="source" class="form-label">Source</label>
                                    <input type="text" class="form-control" id="source" th:field="*{source}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="destination" class="form-label">Destination</label>
                                    <input type="text" class="form-control" id="destination" th:field="*{destination}"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label for="distance" class="form-label">Distance (km)</label>
                                    <input type="number" step="0.1" class="form-control" id="distance"
                                        th:field="*{distance}" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Add Route</button>
                                <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
