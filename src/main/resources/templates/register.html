<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="main-content">
        <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
            <div class="card shadow-lg" style="width: 100%; max-width: 450px; border-radius: 20px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                            style="width: 60px; height: 60px;">
                            <i class="fas fa-user-plus text-primary fa-lg"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Create Account</h3>
                        <p class="text-muted">Join BusGo today</p>
                    </div>

                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="name" class="form-label small fw-bold text-muted">FULL NAME</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="John Doe"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}"
                                placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-muted">PASSWORD</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}"
                                placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">Sign Up</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted">Already have an account? <a th:href="@{/login}"
                                class="text-primary fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
