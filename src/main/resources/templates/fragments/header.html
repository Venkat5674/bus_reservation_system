<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Reservation System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><i class="fas fa-bus-alt me-2"></i>BusGo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <th:block th:if="${session.user != null}">
                        <li class="nav-item">
                            <span class="nav-link fw-bold text-primary"
                                th:text="'Hello, ' + ${session.user.name}">Hello, User</span>
                        </li>
                        <li class="nav-item" th:if="${session.user.role == 'ADMIN'}">
                            <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
                        </li>
                        <li class="nav-item" th:if="${session.user.role == 'USER'}">
                            <a class="nav-link" th:href="@{/ticket}">My Bookings</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="btn btn-outline-danger rounded-pill px-4 btn-sm" th:href="@{/logout}">Logout</a>
                        </li>
                    </th:block>

                    <th:block th:unless="${session.user != null}">
                        <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
                        <li class="nav-item ms-2"><a class="btn btn-primary px-4 shadow-sm"
                                th:href="@{/register}">Register</a></li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>
    <div style="margin-top: 76px;"></div> <!-- Spacer for fixed navbar -->
</body>

</html>
