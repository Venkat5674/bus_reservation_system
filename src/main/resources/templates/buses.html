<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="main-content">
        <div class="container py-5">
            <div class="row mb-4 align-items-center">
                <div class="col">
                    <div th:if="${searchSource != null or searchDestination != null or searchDate != null}">
                        <h2 class="fw-bold mb-0">Search Results</h2>
                        <p class="text-muted">Showing buses for <span class="text-primary fw-bold">
                                <span th:if="${searchSource != null}" th:text="${searchSource} + ' '"></span>
                                <span th:if="${searchDestination != null}"
                                    th:text="'to ' + ${searchDestination}"></span>
                                <span th:if="${searchDate != null}" th:text="' on ' + ${searchDate}"></span>
                            </span></p>
                    </div>
                    <div th:unless="${searchSource != null or searchDestination != null or searchDate != null}">
                        <h2 class="fw-bold mb-0">All Available Buses</h2>
                        <p class="text-muted">Explore our complete schedule</p>
                    </div>
                </div>
                <div class="col-auto">
                    <a th:href="@{/}" class="btn btn-outline-secondary btn-sm"><i
                            class="fas fa-arrow-left me-2"></i>Modify Search</a>
                </div>
            </div>

            <div th:if="${not #lists.isEmpty(schedules)}">
                <div class="row">
                    <div class="col-md-6 mb-4" th:each="schedule : ${schedules}">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <h5 class="fw-bold text-primary mb-1" th:text="${schedule.bus.busName}">Bus Name
                                        </h5>
                                        <span class="badge bg-light text-dark border"
                                            th:text="${schedule.bus.type}">Type</span>
                                    </div>
                                    <div class="text-end">
                                        <h4 class="fw-bold mb-0 text-success" th:text="'$' + ${schedule.price}">$0.00
                                        </h4>
                                        <small class="text-muted">per seat</small>
                                    </div>
                                </div>

                                <hr class="my-3 opacity-25">

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="text-center">
                                        <div class="small fw-bold text-muted">DEPARTURE</div>
                                        <div class="fs-5 fw-bold"
                                            th:text="${#temporals.format(schedule.departureTime, 'HH:mm')}">10:00</div>
                                        <div class="small text-muted" th:text="${schedule.route.source}">Source</div>
                                    </div>
                                    <div class="text-center text-muted px-3">
                                        <i class="fas fa-arrow-right"></i>
                                        <div class="small" style="font-size: 0.7rem;"
                                            th:text="${schedule.route.distance} + 'km'">0km</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="small fw-bold text-muted">ARRIVAL</div>
                                        <div class="fs-5 fw-bold"
                                            th:text="${#temporals.format(schedule.arrivalTime, 'HH:mm')}">14:00</div>
                                        <div class="small text-muted" th:text="${schedule.route.destination}">
                                            Destination</div>
                                    </div>
                                </div>

                                <a th:href="@{/select-seat(scheduleId=${schedule.id})}"
                                    class="btn btn-primary w-100">Select Seats</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(schedules)}">
                <div class="text-center py-5">
                    <div class="mb-3 text-muted"><i class="fas fa-bus-alt fa-3x"></i></div>
                    <h4 class="fw-bold">No buses found</h4>
                    <p class="text-muted">Try changing your search criteria.</p>
                    <a th:href="@{/}" class="btn btn-primary mt-2">Back to Search</a>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
