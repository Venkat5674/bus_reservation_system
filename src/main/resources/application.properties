spring.application.name=bus-reservation-system

# Database Configuration
# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bus_reservation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver (Commented out to allow auto-detection for Postgres/MySQL)

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect (Commented out to allow auto-detection)
spring.jpa.open-in-view=true

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.example.busreservation=DEBUG
